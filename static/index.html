<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运营任务地图</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#F6F5F2;--surface:#FFFFFF;--surface2:#EFEDE8;--surface3:#E8E5DF;
  --border:#DDD9D0;--border2:#C8C3B8;
  --text:#1C1A17;--text2:#6B6760;--text3:#A8A39A;
  --green:#1A5C35;--green-bg:#E8F4EE;--green-border:#A8D8BC;
  --amber:#7A4F0D;--amber-bg:#FBF3E4;--amber-border:#E8C97A;
  --red:#8B1A1A;--red-bg:#FAEAEA;--red-border:#E8B8B8;
  --blue:#1A3D6B;--blue-bg:#EAF0FA;--blue-border:#A8C4E8;
  --purple:#4A1578;--purple-bg:#F0E8FA;--purple-border:#C8A8E8;
  --gray-bg:#F0EDE8;--gray-border:#D4D0C8;
  --accent:#2C5F2E;--radius:6px;--radius-lg:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh}
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo-title{font-size:14px;font-weight:600;letter-spacing:-0.3px}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace}
.nav-section{padding:12px 0}
.nav-label{padding:4px 16px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:12px;color:var(--text2);border-left:2px solid transparent}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--green-bg);font-weight:500}
.filter-section{padding:12px 16px;border-top:1px solid var(--border);margin-top:auto}
.filter-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.filter-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);margin:2px;transition:all 0.12s}
.filter-chip:hover{border-color:var(--accent);color:var(--accent)}
.filter-chip.on{background:var(--green-bg);border-color:var(--green-border);color:var(--green);font-weight:500}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;flex-wrap:wrap}
.page-title{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.stats-chips{display:flex;gap:6px}
.stats-chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500}
.chip-active{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.chip-ended{background:var(--gray-bg);color:var(--text2);border:1px solid var(--gray-border)}
.chip-blank{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.btn{padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:var(--text);font-family:'DM Sans',sans-serif;transition:all 0.12s}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{opacity:0.88}
.content{flex:1;overflow:auto;padding:20px}
.matrix{display:grid;gap:0;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--border)}
.col-header{background:var(--surface2);padding:10px 14px;text-align:center;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border)}
.row-header{background:var(--surface2);padding:12px 14px;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border)}
.row-header-inner{writing-mode:vertical-lr;text-orientation:mixed;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
.cell{background:var(--surface);padding:8px;min-height:90px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);position:relative;transition:background 0.12s}
.cell:hover{background:var(--bg)}
.cell.blank{background:repeating-linear-gradient(45deg,var(--surface),var(--surface) 4px,var(--bg) 4px,var(--bg) 8px)}
.cell.blank:hover{background:repeating-linear-gradient(45deg,var(--green-bg),var(--green-bg) 4px,var(--bg) 4px,var(--bg) 8px)}
.cell-count{position:absolute;top:6px;right:6px;font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);font-weight:500}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:7px 9px;margin-bottom:5px;cursor:pointer;transition:all 0.12s;position:relative}
.task-card:hover{border-color:var(--accent);background:var(--green-bg);transform:translateY(-1px)}
.task-card.ended{opacity:0.55}
.task-name{font-size:11px;font-weight:500;line-height:1.4;color:var(--text);padding-right:14px}
.task-user{font-size:10px;color:var(--text3);margin-top:3px}
.task-dot{position:absolute;top:7px;right:7px;width:6px;height:6px;border-radius:50%}
.dot-active{background:var(--green)}
.dot-ended{background:var(--text3)}
.dot-plan{background:var(--blue)}
.blank-hint{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:74px;gap:4px;opacity:0;transition:opacity 0.15s}
.cell.blank:hover .blank-hint{opacity:1}
.blank-hint-icon{font-size:18px;color:var(--green)}
.blank-hint-text{font-size:10px;color:var(--green);font-weight:500}
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:100;display:none;align-items:flex-start;justify-content:flex-end}
.panel-overlay.show{display:flex}
.panel{width:380px;height:100vh;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;animation:slideIn 0.2s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.panel-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0}
.panel-title{font-size:15px;font-weight:600;line-height:1.3}
.close-btn{width:28px;height:28px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);flex-shrink:0;line-height:1}
.panel-body{flex:1;overflow-y:auto;padding:16px 20px}
.panel-section{margin-bottom:18px}
.panel-section-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.panel-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);gap:12px}
.panel-row:last-child{border-bottom:none}
.panel-key{font-size:12px;color:var(--text2);flex-shrink:0}
.panel-val{font-size:12px;color:var(--text);text-align:right;font-weight:500}
.panel-trigger{background:var(--surface2);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--text);line-height:1.6;border-left:2px solid var(--accent)}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.status-badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge-active{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}.badge-active::before{background:var(--green)}
.badge-ended{background:var(--gray-bg);color:var(--text2);border:1px solid var(--gray-border)}.badge-ended::before{background:var(--text3)}
.badge-plan{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}.badge-plan::before{background:var(--blue)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-activate{background:var(--blue-bg);color:var(--blue)}
.tag-convert{background:var(--purple-bg);color:var(--purple)}
.tag-retain{background:var(--green-bg);color:var(--green)}
.tag-recall{background:var(--amber-bg);color:var(--amber)}
.add-task-btn{width:100%;padding:8px;border-radius:var(--radius);border:1.5px dashed var(--border2);background:transparent;cursor:pointer;font-size:12px;color:var(--text2);font-family:'DM Sans',sans-serif;transition:all 0.12s;margin-top:4px}
.add-task-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--green-bg)}
.legend{display:flex;gap:14px;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:50%}
.blank-legend{width:16px;height:10px;background:repeating-linear-gradient(45deg,#fff,#fff 2px,var(--bg) 2px,var(--bg) 4px);border:1px solid var(--border);border-radius:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:24px;width:460px;max-height:90vh;overflow-y:auto;border:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px}
.form-field{margin-bottom:12px}
.form-field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--accent)}
.form-field textarea{resize:vertical;min-height:60px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text3);font-size:13px;gap:8px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 18px;border-radius:var(--radius-lg);font-size:13px;z-index:999;opacity:0;transition:opacity 0.2s;pointer-events:none}
.toast.show{opacity:1}
.group-head{display:flex;align-items:center;gap:6px;background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius);padding:6px 9px;margin-bottom:5px;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);user-select:none;transition:all 0.12s}
.group-head:hover{border-color:var(--accent);color:var(--accent)}
.group-arrow{font-size:9px;transition:transform 0.15s}
.group-head.open .group-arrow{transform:rotate(90deg)}
.group-count{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;background:var(--surface);border-radius:8px;padding:1px 7px;color:var(--text3)}
.multi-tag{display:inline-block;font-size:9px;background:var(--purple-bg);color:var(--purple);border-radius:8px;padding:1px 6px;margin-top:3px;font-weight:500}
.stage-checks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:4px 0}
.stage-checks label{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text);text-transform:none;letter-spacing:0;font-weight:400;margin:0;cursor:pointer}
.stage-checks input{width:auto;cursor:pointer}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-box{width:340px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;text-align:center}
.login-logo{font-size:16px;font-weight:600;margin-bottom:4px}
.login-sub{font-size:11px;color:var(--text3);margin-bottom:24px;font-family:'DM Mono',monospace}
.login-field{margin-bottom:14px;text-align:left}
.login-field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.login-field input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none}
.login-field input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px}
.login-btn:hover{opacity:0.88}
.login-error{color:var(--red);font-size:12px;margin-top:10px;min-height:18px}
.user-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);padding:6px 12px;background:var(--surface2);border-radius:20px;border:1px solid var(--border)}
.user-badge .role-dot{width:6px;height:6px;border-radius:50%}
.role-admin{background:var(--green)}
.role-viewer{background:var(--amber)}
.logout-btn{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;text-decoration:underline;margin-left:4px}
.logout-btn:hover{color:var(--red)}
.hidden{display:none!important}
.multi-goal-tag{display:inline-block;font-size:9px;background:var(--green-bg);color:var(--green);border-radius:8px;padding:1px 6px;margin-top:3px;margin-left:4px;font-weight:500}
</style>
</head>
<body>
<div id="login-page" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">运营任务地图</div>
    <div class="login-sub">Ops Task Map · 请登录</div>
    <div class="login-field"><label>账号</label><input type="text" id="login-user" placeholder="输入账号" autocomplete="username"></div>
    <div class="login-field"><label>密码</label><input type="password" id="login-pass" placeholder="输入密码" autocomplete="current-password"></div>
    <button class="login-btn" onclick="doLogin()">登 录</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>
<div class="layout" id="main-app" style="display:none">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-title">运营任务地图</div>
      <div class="logo-sub">Ops Task Map v2.2</div>
    </div>
    <div id="user-info" style="padding:8px 16px;border-bottom:1px solid var(--border)">
      <div class="user-badge">
        <span class="role-dot" id="role-dot"></span>
        <span id="user-display"></span>
        <button class="logout-btn" onclick="doLogout()">登出</button>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">视图</div>
      <div class="nav-item active">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="5" height="5" rx="1"/><rect x="8" y="1" width="5" height="5" rx="1"/><rect x="1" y="8" width="5" height="5" rx="1"/><rect x="8" y="8" width="5" height="5" rx="1"/></svg>
        任务矩阵地图
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-label">目标类型</div>
      <div id="goal-filters"></div>
      <div style="margin-top:10px">
        <div class="filter-label">状态</div>
        <div id="status-filters"></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="page-title">运营任务矩阵地图</div>
      <div class="topbar-right">
        <div class="stats-chips">
          <span class="stats-chip chip-active" id="stat-active">进行中 —</span>
          <span class="stats-chip chip-ended" id="stat-ended">已结束 —</span>
          <span class="stats-chip chip-blank" id="stat-blank">空白格 —</span>
        </div>
        <div class="legend">
          <div class="legend-item"><span class="legend-dot" style="background:var(--green)"></span>进行中</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span>规划中</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--text3)"></span>已结束</div>
          <div class="legend-item"><span class="blank-legend"></span>待覆盖</div>
        </div>
        <button class="btn admin-only" onclick="downloadTemplate()">↓ 模板</button>
        <button class="btn admin-only" onclick="document.getElementById('csv-input').click()">↑ 导入CSV/Excel</button>
        <input class="admin-only" type="file" id="csv-input" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleCSV(this)">
        <button class="btn btn-primary admin-only" onclick="openAddModal()">+ 新增任务</button>
      </div>
    </div>
    <div class="content">
      <div id="matrix-wrap"><div class="loading"><div class="spinner"></div>加载中...</div></div>
    </div>
  </div>
</div>

<div class="panel-overlay" id="panel-overlay" onclick="closePanel(event)">
  <div class="panel" id="panel">
    <div class="panel-header">
      <div class="panel-title" id="panel-title"></div>
      <button class="close-btn" onclick="closePanel()">×</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">新增运营任务</div>
    <input type="hidden" id="f-id">
    <div class="form-field"><label>任务名称</label><input type="text" id="f-name" placeholder="输入任务名称"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-field"><label>付费等级（可多选）</label>
        <div class="stage-checks" id="f-stage-checks">
          <label><input type="checkbox" value="未付费用户">未付费用户</label>
          <label><input type="checkbox" value="普通消费用户">普通消费</label>
          <label><input type="checkbox" value="一般消费用户">一般消费</label>
          <label><input type="checkbox" value="小R">小R</label>
          <label><input type="checkbox" value="中R">中R</label>
          <label><input type="checkbox" value="大R">大R</label>
        </div>
      </div>
      <div class="form-field"><label>目标类型（可多选）</label>
        <div class="stage-checks" id="f-goal-checks">
          <label><input type="checkbox" value="首单激活">首单激活</label>
          <label><input type="checkbox" value="付费转化">付费转化</label>
          <label><input type="checkbox" value="留存">留存</label>
          <label><input type="checkbox" value="召回">召回</label>
        </div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-field"><label>用户类型</label><input type="text" id="f-user" placeholder="如：商店渠道-新用户"></div>
      <div class="form-field"><label>状态</label>
        <select id="f-status">
          <option value="进行中">进行中</option>
          <option value="规划中">规划中</option>
          <option value="已结束">已结束</option>
        </select>
      </div>
    </div>
    <div class="form-field"><label>任务ID</label><input type="text" id="f-tid" placeholder="系统内任务ID（选填）"></div>
    <div class="form-field"><label>触发条件</label><textarea id="f-trigger" placeholder="描述具体触发条件和逻辑"></textarea></div>
    <div class="form-field"><label>推送内容</label><textarea id="f-push" placeholder="推送给用户的消息内容"></textarea></div>
    <div class="form-field"><label>备注</label><textarea id="f-note" placeholder="数据情况、执行记录或其他补充说明"></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="submitTask()">确认</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let authToken=sessionStorage.getItem('ops_token')||'';
let authRole=sessionStorage.getItem('ops_role')||'';
let authUser=sessionStorage.getItem('ops_user')||'';

async function doLogin(){
  const user=document.getElementById('login-user').value.trim();
  const pass=document.getElementById('login-pass').value;
  const errEl=document.getElementById('login-error');
  if(!user||!pass){errEl.textContent='请输入账号和密码';return;}
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})});
    if(!r.ok){const e=await r.json();errEl.textContent=e.detail||'登录失败';return;}
    const data=await r.json();
    authToken=data.token;authRole=data.role;authUser=data.user;
    sessionStorage.setItem('ops_token',authToken);
    sessionStorage.setItem('ops_role',authRole);
    sessionStorage.setItem('ops_user',authUser);
    showApp();
  }catch(e){errEl.textContent='网络错误，请重试';}
}
function doLogout(){
  authToken='';authRole='';authUser='';
  sessionStorage.removeItem('ops_token');
  sessionStorage.removeItem('ops_role');
  sessionStorage.removeItem('ops_user');
  document.getElementById('login-page').style.display='';
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-error').textContent='';
}
function showApp(){
  document.getElementById('login-page').style.display='none';
  document.getElementById('main-app').style.display='';
  document.getElementById('user-display').textContent=authUser+(authRole==='admin'?' (管理员)':' (只读)');
  document.getElementById('role-dot').className='role-dot '+(authRole==='admin'?'role-admin':'role-viewer');
  // 隐藏/显示编辑类元素
  document.querySelectorAll('.admin-only').forEach(el=>{
    if(authRole!=='admin')el.classList.add('hidden');
    else el.classList.remove('hidden');
  });
  loadTasks();
}
// 密码框回车登录
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('login-user').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-pass').focus();});
  if(authToken)showApp();
});

const STAGES=['未付费用户','普通消费用户','一般消费用户','小R','中R','大R'];
const GOALS=['首单激活','付费转化','留存','召回'];
const GOAL_TAGS={首单激活:'tag-activate',付费转化:'tag-convert',留存:'tag-retain',召回:'tag-recall'};

let tasks=[];
let filterGoals=new Set(GOALS);
let filterStatus=new Set(['进行中','已结束','规划中']);

function showToast(msg,ms=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json','Authorization':'Bearer '+authToken}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch('/api'+path,opts);
  if(r.status===401){doLogout();throw new Error('登录已过期，请重新登录');}
  if(r.status===403){throw new Error('无编辑权限，请使用管理员账号');}
  if(!r.ok){const e=await r.json().catch(()=>({detail:'请求失败'}));throw new Error(e.detail||'请求失败');}
  return r.json();
}

async function loadTasks(){
  try{
    tasks=await api('GET','/tasks');
    renderMatrix();
  }catch(e){
    document.getElementById('matrix-wrap').innerHTML='<div class="loading">数据加载失败，请刷新重试</div>';
  }
}

function getFiltered(){
  return tasks.filter(t=>goalsOf(t).some(g=>filterGoals.has(g))&&filterStatus.has(t.status));
}

function stagesOf(t){
  return String(t.stage||'').split(/[、,，;；\/]+/).map(s=>s.trim()).filter(Boolean);
}
function goalsOf(t){
  return String(t.goal||'').split(/[、,，;；\/]+/).map(s=>s.trim()).filter(Boolean);
}
const expandedGroups=new Set();
function toggleGroup(key){
  if(expandedGroups.has(key))expandedGroups.delete(key);
  else expandedGroups.add(key);
  renderMatrix();
}
function taskCardHTML(t){
  const dotClass=t.status==='进行中'?'dot-active':t.status==='规划中'?'dot-plan':'dot-ended';
  let tags='';
  if(stagesOf(t).length>1)tags+='<span class="multi-tag">for多级用户</span>';
  if(goalsOf(t).length>1)tags+='<span class="multi-goal-tag">for多个目标</span>';
  const tagsHtml=tags?'<br>'+tags:'';
  return `<div class="task-card${t.status==='已结束'?' ended':''}" onclick="event.stopPropagation();openPanel(${t.id})">
    <div class="task-name">${t.name}</div>
    <div class="task-user">${t.user||''}${tagsHtml}</div>
    <span class="task-dot ${dotClass}"></span>
  </div>`;
}
function renderMatrix(){
  const filtered=getFiltered();
  let html=`<div class="matrix" style="grid-template-columns:60px repeat(${STAGES.length},1fr)">`;
  html+=`<div class="col-header" style="background:var(--surface2)"></div>`;
  STAGES.forEach(s=>html+=`<div class="col-header">${s}</div>`);
  GOALS.forEach(g=>{
    html+=`<div class="row-header" style="border-bottom:1px solid var(--border)"><div class="row-header-inner">${g}</div></div>`;
    STAGES.forEach(s=>{
      const cellTasks=filtered.filter(t=>stagesOf(t).includes(s)&&goalsOf(t).includes(g));
      const isBlank=cellTasks.length===0;
      html+=`<div class="cell${isBlank?' blank':''}" onclick="${isBlank&&authRole==='admin'?`openAddModalPre('${s}','${g}')`:''}">`;
      if(!isBlank){
        html+=`<span class="cell-count">${cellTasks.length}</span>`;
        const groups={};
        cellTasks.forEach(t=>{
          const u=t.user||'未分类';
          (groups[u]=groups[u]||[]).push(t);
        });
        Object.keys(groups).forEach(u=>{
          const list=groups[u];
          if(list.length>=2){
            const key=s+'|'+g+'|'+u;
            const open=expandedGroups.has(key);
            html+=`<div class="group-head${open?' open':''}" onclick="event.stopPropagation();toggleGroup('${key.replace(/'/g,"\\'")}')">
              <span class="group-arrow">▶</span><span>${u}</span><span class="group-count">${list.length}</span></div>`;
            if(open)list.forEach(t=>{html+=taskCardHTML(t);});
          } else {
            list.forEach(t=>{html+=taskCardHTML(t);});
          }
        });
        if(authRole==='admin')html+=`<button class="add-task-btn" onclick="event.stopPropagation();openAddModalPre('${s}','${g}')">+ 在此新增</button>`;
      } else {
        html+=`<div class="blank-hint"><div class="blank-hint-icon">+</div><div class="blank-hint-text">点击新增</div></div>`;
      }
      html+=`</div>`;
    });
  });
  html+=`</div>`;
  document.getElementById('matrix-wrap').innerHTML=html;
  updateStats();
}
function updateStats(){
  const active=tasks.filter(t=>t.status==='进行中').length;
  const ended=tasks.filter(t=>t.status==='已结束').length;
  let blanks=0;
  GOALS.forEach(g=>STAGES.forEach(s=>{if(!tasks.find(t=>stagesOf(t).includes(s)&&goalsOf(t).includes(g)))blanks++;}));
  document.getElementById('stat-active').textContent=`进行中 ${active}`;
  document.getElementById('stat-ended').textContent=`已结束 ${ended}`;
  document.getElementById('stat-blank').textContent=`空白格 ${blanks}`;
}
function renderFilters(){
  document.getElementById('goal-filters').innerHTML=GOALS.map(g=>`<span class="filter-chip on" onclick="toggleGoalFilter('${g}',this)">${g}</span>`).join('');
  document.getElementById('status-filters').innerHTML=['进行中','规划中','已结束'].map(s=>`<span class="filter-chip on" onclick="toggleStatusFilter('${s}',this)">${s}</span>`).join('');
}

function toggleGoalFilter(g,el){
  if(filterGoals.has(g)){if(filterGoals.size>1){filterGoals.delete(g);el.classList.remove('on');}}
  else{filterGoals.add(g);el.classList.add('on');}
  renderMatrix();
}
function toggleStatusFilter(s,el){
  if(filterStatus.has(s)){filterStatus.delete(s);el.classList.remove('on');}
  else{filterStatus.add(s);el.classList.add('on');}
  renderMatrix();
}

function openPanel(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const statusBadge=t.status==='进行中'?'badge-active 进行中':t.status==='规划中'?'badge-plan 规划中':'badge-ended 已结束';
  const[sc,st]=statusBadge.split(' ');
  document.getElementById('panel-title').textContent=t.name;
  document.getElementById('panel-body').innerHTML=`
    <div class="panel-section">
      <div class="panel-section-title">基础信息</div>
      <div class="panel-row"><span class="panel-key">状态</span><span class="panel-val"><span class="status-badge ${sc}">${st}</span></span></div>
      <div class="panel-row"><span class="panel-key">任务ID</span><span class="panel-val" style="font-family:'DM Mono',monospace">${t.tid||'待填写'}</span></div>
      <div class="panel-row"><span class="panel-key">付费等级</span><span class="panel-val">${t.stage}</span></div>
      <div class="panel-row"><span class="panel-key">目标类型</span><span class="panel-val">${goalsOf(t).map(g=>`<span class="tag ${GOAL_TAGS[g]||''}" style="margin-left:3px">${g}</span>`).join('')}</span></div>
      <div class="panel-row"><span class="panel-key">用户类型</span><span class="panel-val">${t.user||'—'}</span></div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">触发逻辑</div>
      <div class="panel-trigger">${t.trigger||'<span style="color:var(--text3)">暂未填写触发条件</span>'}</div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">推送内容</div>
      <div class="panel-trigger" style="border-left-color:var(--purple)">${t.push||'<span style="color:var(--text3)">暂未填写推送内容</span>'}</div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">备注</div>
      <div style="background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--text);line-height:1.6;min-height:40px">${t.note||'<span style="color:var(--text3)">暂无备注</span>'}</div>
    </div>
    ${authRole==='admin'?`<div class="panel-section" style="display:flex;gap:8px">
      <button class="btn" style="flex:1" onclick="editTask(${t.id})">编辑</button>
      <button class="btn" style="flex:1;color:var(--red);border-color:var(--red-border)" onclick="deleteTask(${t.id})">删除</button>
    </div>`:'<div class="panel-section" style="text-align:center;font-size:12px;color:var(--text3)">只读账号，如需编辑请联系管理员</div>'}`;
  document.getElementById('panel-overlay').classList.add('show');
}

function closePanel(e){
  if(!e||e.target===document.getElementById('panel-overlay'))
    document.getElementById('panel-overlay').classList.remove('show');
}

function openAddModal(){
  document.getElementById('modal-title').textContent='新增运营任务';
  document.getElementById('f-id').value='';
  document.getElementById('modal-overlay').classList.add('show');
}
function openAddModalPre(stage,goal){
  openAddModal();
  setStageChecks([stage]);
  setGoalChecks([goal]);
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('show');
  ['f-id','f-name','f-user','f-trigger','f-push','f-note','f-tid'].forEach(id=>document.getElementById(id).value='');
  setStageChecks([]);
  setGoalChecks([]);
  document.getElementById('f-status').value='进行中';
}

function getStageChecks(){
  return Array.from(document.querySelectorAll('#f-stage-checks input:checked')).map(c=>c.value);
}
function setStageChecks(vals){
  document.querySelectorAll('#f-stage-checks input').forEach(c=>{c.checked=vals.includes(c.value);});
}
function getGoalChecks(){
  return Array.from(document.querySelectorAll('#f-goal-checks input:checked')).map(c=>c.value);
}
function setGoalChecks(vals){
  document.querySelectorAll('#f-goal-checks input').forEach(c=>{c.checked=vals.includes(c.value);});
}
async function submitTask(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('请填写任务名称');return;}
  if(getStageChecks().length===0){alert('请至少勾选一个付费等级');return;}
  if(getGoalChecks().length===0){alert('请至少勾选一个目标类型');return;}
  const data={
    name,
    tid:document.getElementById('f-tid').value.trim(),
    stage:getStageChecks().join('、'),
    goal:getGoalChecks().join('、'),
    user:document.getElementById('f-user').value||'待填写',
    status:document.getElementById('f-status').value,
    trigger:document.getElementById('f-trigger').value,
    push:document.getElementById('f-push').value,
    note:document.getElementById('f-note').value,
  };
  const editId=document.getElementById('f-id').value;
  try{
    if(editId){
      const updated=await api('PUT',`/tasks/${editId}`,data);
      tasks=tasks.map(t=>t.id===parseInt(editId)?updated:t);
      showToast('已更新');
    } else {
      const created=await api('POST','/tasks',data);
      tasks.push(created);
      showToast('已新增');
    }
    closeModal();renderMatrix();
  }catch(e){alert('操作失败：'+e.message);}
}

function editTask(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  document.getElementById('modal-title').textContent='编辑任务';
  document.getElementById('f-id').value=t.id;
  document.getElementById('f-name').value=t.name;
  document.getElementById('f-tid').value=t.tid||'';
  setStageChecks(stagesOf(t));
  setGoalChecks(goalsOf(t));
  document.getElementById('f-user').value=t.user||'';
  document.getElementById('f-status').value=t.status;
  document.getElementById('f-trigger').value=t.trigger||'';
  document.getElementById('f-push').value=t.push||'';
  document.getElementById('f-note').value=t.note||'';
  closePanel();
  document.getElementById('modal-overlay').classList.add('show');
}

async function deleteTask(id){
  if(!confirm('确认删除这个任务？'))return;
  try{
    await api('DELETE',`/tasks/${id}`);
    tasks=tasks.filter(x=>x.id!==id);
    document.getElementById('panel-overlay').classList.remove('show');
    renderMatrix();
    showToast('已删除');
  }catch(e){alert('删除失败：'+e.message);}
}

/* ===== CSV 导入（修复BOM与GBK编码问题） ===== */
function stripBOM(s){return s.replace(/^\uFEFF/,'');}
// 完整CSV解析：支持引号内换行、转义引号，返回二维数组
function parseCSVText(text){
  text=stripBOM(text);
  const rows=[];let row=[];let cur='';let inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){
        if(text[i+1]==='"'){cur+='"';i++;}
        else inQ=false;
      } else cur+=c;
    } else {
      if(c==='"')inQ=true;
      else if(c===','){row.push(cur);cur='';}
      else if(c==='\n'||c==='\r'){
        if(c==='\r'&&text[i+1]==='\n')i++;
        row.push(cur);cur='';
        if(row.some(x=>x.trim()!==''))rows.push(row);
        row=[];
      }
      else cur+=c;
    }
  }
  if(cur!==''||row.length>0){row.push(cur);if(row.some(x=>x.trim()!==''))rows.push(row);}
  return rows;
}
function buildIdx(headerRow){
  const headers=headerRow.map(h=>stripBOM(String(h||'')).trim());
  const idx={
    name:headers.indexOf('任务名称'),
    tid:headers.indexOf('任务ID'),
    stage:headers.indexOf('付费等级'),
    goal:headers.indexOf('目标类型'),
    user:headers.indexOf('用户类型'),
    status:headers.indexOf('状态'),
    trigger:headers.indexOf('触发条件'),
    push:headers.indexOf('推送内容'),
    note:headers.indexOf('备注'),
  };
  if(idx.name===-1||idx.stage===-1||idx.goal===-1)return {fail:true,headers};
  return {idx};
}
// 单元格内换行替换为空格，避免显示混乱
function cellVal(row,i){
  if(i<0)return '';
  return String(row[i]==null?'':row[i]).replace(/[\r\n]+/g,' ').trim();
}

async function handleCSV(input){
  if(authRole!=='admin'){alert('无编辑权限');return;}
  const file=input.files[0];if(!file)return;
  input.value='';
  try{
    const buf=await file.arrayBuffer();
    const bytes=new Uint8Array(buf);
    let rows=null;
    const isXlsx=(bytes[0]===0x50&&bytes[1]===0x4B)||(bytes[0]===0xD0&&bytes[1]===0xCF);
    if(isXlsx){
      if(typeof XLSX==='undefined'){alert('Excel解析组件加载失败，请检查网络后刷新页面重试，或将文件另存为CSV格式上传');return;}
      const wb=XLSX.read(buf,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      rows=rows.filter(r=>r.some(x=>String(x||'').trim()!==''));
    } else {
      let text=new TextDecoder('utf-8').decode(buf);
      let r=buildIdx(parseCSVText(text)[0]||[]);
      if(r.fail){
        try{
          const gbkText=new TextDecoder('gbk').decode(buf);
          const gr=buildIdx(parseCSVText(gbkText)[0]||[]);
          if(!gr.fail)text=gbkText;
        }catch(e){}
      }
      rows=parseCSVText(text);
    }
    if(!rows||rows.length<2){alert('文件为空或格式不正确');return;}
    const hr=buildIdx(rows[0]);
    if(hr.fail){
      alert('文件缺少必填列：任务名称、付费等级、目标类型\n\n识别到的表头：'+hr.headers.join('、')+'\n\n提示：请确认表头与模板一致，可点击「↓ 模板」下载标准模板对照');
      return;
    }
    const idx=hr.idx;
    const validS=['未付费用户','普通消费用户','一般消费用户','小R','中R','大R'];
    const validG=['首单激活','付费转化','留存','召回'];
    const validSt=['进行中','规划中','已结束'];
    const batch=[];let skipped=0;const errors=[];
    for(let i=1;i<rows.length;i++){
      const row=rows[i];
      const name=cellVal(row,idx.name);
      if(!name){skipped++;errors.push(`第${i+1}行：任务名称为空`);continue;}
      const stage=cellVal(row,idx.stage);
      const goal=cellVal(row,idx.goal);
      const stageList=stage.split(/[、,，;；\/]+/).map(x=>x.trim()).filter(Boolean);
      const badStage=stageList.find(x=>!validS.includes(x));
      if(stageList.length===0||badStage!==undefined){skipped++;errors.push(`第${i+1}行「${name}」：付费等级「${badStage||stage}」无效`);continue;}
      const goalList=goal.split(/[、,，;；\/]+/).map(x=>x.trim()).filter(Boolean);
      const badGoal=goalList.find(x=>!validG.includes(x));
      if(goalList.length===0||badGoal!==undefined){skipped++;errors.push(`第${i+1}行「${name}」：目标类型「${badGoal||goal}」无效`);continue;}
      const status=cellVal(row,idx.status);
      batch.push({
        name,
        tid:cellVal(row,idx.tid),
        stage:stageList.join('、'),goal:goalList.join('、'),
        user:cellVal(row,idx.user)||'待填写',
        status:validSt.includes(status)?status:'进行中',
        trigger:cellVal(row,idx.trigger),
        push:cellVal(row,idx.push),
        note:cellVal(row,idx.note),
      });
    }
    if(!batch.length){
      alert('没有有效数据可导入'+(errors.length?'\n\n异常：\n'+errors.slice(0,5).join('\n'):''));
      return;
    }
    const res=await api('POST','/tasks/batch',batch);
    await loadTasks();
    let msg=`导入完成：新增 ${res.added} · 更新 ${res.updated}`+(skipped?` · 跳过 ${skipped}`:'');
    showToast(msg,3000);
    if(errors.length)console.warn('导入异常明细：',errors);
  }catch(err){
    alert('文件解析失败：'+err.message);
  }
}

function downloadTemplate(){
  const headers=['任务名称','任务ID','付费等级','目标类型','用户类型','状态','触发条件','推送内容','备注'];
  const examples=[
    ['次日转化','1197','未付费用户','首单激活','新用户','进行中','未支付且首登48小时以上且未付费','限时免单券',''],
    ['小R留存示例','','小R','留存','小R用户','规划中','连续7天未登录','提醒领取专属券',''],
    ['连麦激活示例(多等级)','','小R、中R、大R','首单激活','R级用户','进行中','7天未连麦','连麦优惠提醒',''],
  ];
  const bom='\uFEFF';
  const rows=[headers,...examples].map(r=>r.map(c=>c.includes(',')||c.includes('"')?`"${c.replace(/"/g,'""')}"`:c).join(','));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([bom+rows.join('\r\n')],{type:'text/csv;charset=utf-8'}));
  a.download='运营任务模板.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);
}
